name: Docker image build

on: [push]

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build image
        run: docker build -t gammapy:test .

      - name: Test image
        run: docker run --rm gammapy:test python -c "import gammapy; print(gammapy.__version__)"
